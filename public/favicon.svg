<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="Tribe">
  <defs>
    <linearGradient id="tribe-bg" x1="4" y1="2" x2="28" y2="30" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4d754d"/>
      <stop offset="1" stop-color="#2f4a2f"/>
    </linearGradient>
    <linearGradient id="ember-glow" x1="16" y1="6" x2="16" y2="26" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f0c4a8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#e8a87c" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- App icon background -->
  <rect width="32" height="32" rx="8.5" fill="url(#tribe-bg)"/>
  <!-- Warm center glow -->
  <ellipse cx="16" cy="15" rx="10" ry="9" fill="url(#ember-glow)"/>
  <!-- Connection triangle — the tribe link -->
  <path
    d="M16 8.25 L23.1 20.75 L8.9 20.75 Z"
    stroke="#e8a87c"
    stroke-width="1.35"
    stroke-linejoin="round"
    stroke-opacity="0.65"
    fill="none"
  />
  <!-- Inner ring — belonging -->
  <circle cx="16" cy="15.5" r="6.75" stroke="#f4f7f4" stroke-width="0.85" stroke-opacity="0.22" fill="none"/>
  <!-- You (top) -->
  <circle cx="16" cy="8.25" r="3.15" fill="#f4f7f4"/>
  <circle cx="16" cy="8.25" r="1.35" fill="#3a5c3a" fill-opacity="0.35"/>
  <!-- Two others -->
  <circle cx="8.9" cy="20.75" r="3.15" fill="#e8a87c"/>
  <circle cx="8.9" cy="20.75" r="1.2" fill="#c06a3e" fill-opacity="0.45"/>
  <circle cx="23.1" cy="20.75" r="3.15" fill="#e8a87c"/>
  <circle cx="23.1" cy="20.75" r="1.2" fill="#c06a3e" fill-opacity="0.45"/>
</svg>
